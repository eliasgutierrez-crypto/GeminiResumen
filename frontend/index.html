<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gemini Resumen - Login</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <h1>Inicia sesión o regístrate</h1>

  <div>
    <h2>Registro</h2>
    <input type="text" id="regUsername" placeholder="Usuario">
    <input type="password" id="regPassword" placeholder="Contraseña">
    <button id="btnRegister">Registrar</button>
  </div>

  <div>
    <h2>Login</h2>
    <input type="text" id="loginUsername" placeholder="Usuario">
    <input type="password" id="loginPassword" placeholder="Contraseña">
    <button id="btnLogin">Ingresar</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
