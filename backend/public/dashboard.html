<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gemini Resumen - Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">

  <header class="header-modern text-white py-6 px-8 flex justify-between items-center animate-slide-in">
    <div class="flex items-center space-x-3">
      <div class="w-10 h-10 bg-white/20 rounded-lg flex items-center justify-center">
        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
        </svg>
      </div>
      <div>
        <h1 class="text-2xl font-bold">Gemini Resumen</h1>
        <p class="text-white/80 text-sm">Resumen inteligente con IA</p>
      </div>
    </div>
    <button id="logoutBtn" class="bg-white/20 hover:bg-white/30 text-white px-4 py-2 rounded-lg transition flex items-center space-x-2">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
      </svg>
      <span>Cerrar sesión</span>
    </button>
  </header>

  <main class="flex-1 p-8 max-w-4xl mx-auto w-full">
    <div class="animate-fade-in">
      <!-- Tarjeta de entrada de texto -->
      <div class="form-container p-8 mb-8">
        <div class="flex items-center mb-6">
          <div class="w-12 h-12 bg-gradient-to-r from-purple-500 to-indigo-600 rounded-lg flex items-center justify-center mr-4">
            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
            </svg>
          </div>
          <div>
            <h2 class="text-2xl font-bold text-gray-800">Resumir Texto</h2>
            <p class="text-gray-600">Pega el texto que quieres resumir y obtén un resumen conciso</p>
          </div>
        </div>
        
        <textarea id="texto" placeholder="Pega aquí el texto que quieres resumir...\n\nEjemplo: El cambio climático es uno de los mayores desafíos que enfrenta la humanidad en el siglo XXI. El aumento de las temperaturas globales, el derretimiento de los glaciares y el aumento del nivel del mar son algunas de las consecuencias más evidentes..." class="textarea-modern w-full mb-6"></textarea>
        
        <div class="flex items-center justify-between">
          <div class="text-sm text-gray-500">
            <span id="charCount">0</span> caracteres
          </div>
          <button id="resumirBtn" class="btn-primary px-8 py-3 text-lg flex items-center space-x-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
            </svg>
            <span>Resumir</span>
          </button>
        </div>
      </div>

      <!-- Tarjeta de resultados -->
      <div class="result-container" id="resultadoContainer">
        <div class="flex items-center mb-4">
          <div class="w-12 h-12 bg-gradient-to-r from-green-500 to-emerald-600 rounded-lg flex items-center justify-center mr-4">
            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
          </div>
          <div>
            <h3 class="text-xl font-bold text-gray-800">Resumen</h3>
            <p class="text-gray-600">El resumen generado aparecerá aquí</p>
          </div>
        </div>
        
        <div id="resultado" class="text-gray-700 leading-relaxed">
          <p class="text-gray-500 italic">Espera el resumen después de hacer clic en "Resumir"...</p>
        </div>
      </div>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
