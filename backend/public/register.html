<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gemini Resumen - Registro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="gradient-bg min-h-screen flex items-center justify-center p-4">
  <div class="form-container p-10 rounded-2xl w-full max-w-md animate-fade-in">
    <div class="text-center mb-8">
      <h1 class="text-4xl font-bold gradient-text mb-2">Crear Cuenta</h1>
      <p class="text-gray-600">Únete a Gemini Resumen</p>
    </div>
    
    <form id="registerForm" class="flex flex-col gap-6">
      <div class="space-y-2">
        <label class="text-sm font-medium text-gray-700">Usuario</label>
        <input type="text" id="regUsername" placeholder="Elige un nombre de usuario" class="input-modern w-full">
      </div>
      
      <div class="space-y-2">
        <label class="text-sm font-medium text-gray-700">Contraseña</label>
        <input type="password" id="regPassword" placeholder="Crea una contraseña segura" class="input-modern w-full">
      </div>
      
      <button type="submit" id="btnRegister" class="btn-primary w-full py-3 text-lg">
        Registrarse
      </button>
    </form>
    
    <div class="mt-8 text-center">
      <p class="text-gray-600">¿Ya tienes cuenta? 
        <a href="index.html" class="gradient-text font-semibold hover:underline transition">Inicia sesión aquí</a>
      </p>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
